# ─────────────────────────────────────────────────────────────────
#  SFIA Skills Intelligence Platform — Nginx Reverse Proxy
#  Used in production (docker-compose.prod.yml)
#
#  Routes:
#    /          →  viewer (React static build, port 80)
#    /api/*     →  parser API (FastAPI, port 8000)
#    /docs      →  parser API Swagger UI
#    /health    →  parser API health check
# ─────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;

    # ── Upstream services ──────────────────────────────────────────
    upstream parser_api {
        server sfia-parser:8000;
    }

    upstream viewer_app {
        server sfia-viewer:80;
    }

    # ── HTTP server ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 25M;   # allow CV uploads up to 25MB

        # ── API routes ─────────────────────────────────────────────
        location ~ ^/(parse|candidates|profiles|dashboard|health|docs|openapi) {
            proxy_pass         http://parser_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;   # long timeout for first-parse model warm-up
        }

        # ── Frontend (SPA) ─────────────────────────────────────────
        location / {
            proxy_pass       http://viewer_app;
            proxy_set_header Host $host;
        }

        # ── HTTPS redirect (uncomment when certs are configured) ───
        # return 301 https://$host$request_uri;
    }

    # ── HTTPS server (production) ──────────────────────────────────
    # Uncomment and configure when TLS certificates are available.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     client_max_body_size 25M;
    #
    #     location ~ ^/(parse|candidates|profiles|dashboard|health|docs|openapi) {
    #         proxy_pass       http://parser_api;
    #         proxy_set_header Host            $host;
    #         proxy_set_header X-Real-IP       $remote_addr;
    #         proxy_read_timeout 300s;
    #     }
    #
    #     location / {
    #         proxy_pass http://viewer_app;
    #     }
    # }
}
