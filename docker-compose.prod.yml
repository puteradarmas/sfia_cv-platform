version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  SFIA Skills Intelligence Platform  —  Production Overrides
#  Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#  Or:     make prod
# ─────────────────────────────────────────────────────────────────

services:

  db:
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    # Do NOT expose DB port publicly in production
    ports: !reset []

  parser:
    build:
      target: production
    restart: always
    environment:
      APP_ENV:      production
      LOG_LEVEL:    warning
      # Offline mode — models must already be cached
      TRANSFORMERS_OFFLINE: "1"
    # No source bind mounts in production
    volumes:
      - hf_cache:/cache/huggingface
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  viewer:
    build:
      target: production
    restart: always
    environment:
      VITE_API_URL: ${API_PUBLIC_URL}
    volumes: []

  # ── Nginx reverse proxy (production only) ──────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sfia-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./scripts/certs:/etc/nginx/certs:ro
    depends_on:
      - parser
      - viewer
    networks:
      - sfia-net
